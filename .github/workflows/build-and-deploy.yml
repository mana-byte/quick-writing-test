name: build and deploy release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login to Docker Registry
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    - name: Build the Docker image
      run: |
        set -e
        docker compose build
        docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    - name: set up ssh
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 22 ${{ secrets.TARGET_SERVER_IP }} >> ~/.ssh/known_hosts
    - name: Deploy to server
      run: |
        ssh -v -o StrictHostKeyChecking=accept-new admin@${{ secrets.TARGET_SERVER_IP }} << 'ENDSSH'
        REPO_DIR=~/quick-writing-test
        if [ ! -d "$REPO_DIR" ]; then
          git clone https://github.com/mana-byte/quick-writing-test
        else
          cd $REPO_DIR && git pull --force
        fi
        # Setup
        cd $REPO_DIR || true
        docker swarm init || true
        docker secret rm api_key || true
        echo "${{ secrets.API_KEY }}" | docker secret create api_key -
        docker stack rm quick_writing_test || true
        docker stack deploy -c docker-compose.yml quick_writing_test
        ENDSSH
        

